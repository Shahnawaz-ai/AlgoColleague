<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — Algo Colleague</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script async crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_aW50ZW50LWJ1Y2stNTYuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
  <style>
    :root{--bg:#03060d;--bg2:#080d1a;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--primary:#6366f1;--violet:#8b5cf6;--emerald:#10b981;--amber:#f59e0b;--text-1:#f8fafc;--text-2:#94a3b8;--text-3:#64748b;--grad:linear-gradient(135deg,#6366f1,#8b5cf6)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased}
    #loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .4s}
    .spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
    @keyframes spin{100%{transform:rotate(360deg)}}
    .loading-text{color:var(--text-2);font-size:14px}
    .page{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:40px 20px;}
    .card{width:100%;max-width:540px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:48px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
    .logo-container{width:64px;height:64px;margin:0 auto 32px;border-radius:16px;background:var(--grad);display:flex;align-items:center;justify-content:center}
    .logo-container svg{width:36px;height:36px;fill:#fff}
    h1{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:700;line-height:1.2;margin-bottom:16px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:var(--text-2);font-size:16px;line-height:1.6;margin-bottom:40px}
    .feature-list{text-align:left;margin-bottom:40px;display:flex;flex-direction:column;gap:16px}
    .feature-item{display:flex;align-items:center;gap:16px;padding:16px;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
    .feature-icon{font-size:1.5rem;flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border-radius:10px}
    .feature-text h4{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:4px}
    .feature-text p{font-size:13px;color:var(--text-3)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 32px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s;text-decoration:none;width:100%}
    .btn-linkedin{background:#0a66c2;color:#fff;box-shadow:0 8px 24px rgba(10,102,194,.25)}
    .btn-linkedin:hover:not(:disabled){background:#085fa8;transform:translateY(-2px);box-shadow:0 12px 32px rgba(10,102,194,.35)}
    .btn-linkedin:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(99,102,241,.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(99,102,241,.45)}
    .success-icon{width:80px;height:80px;border-radius:50%;margin:0 auto 24px;background:rgba(16,185,129,.15);border:2px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
    .info-box{display:flex;gap:12px;align-items:flex-start;padding:16px;border-radius:12px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);margin-bottom:28px;text-align:left}
    .info-box p{font-size:13px;color:var(--text-2);line-height:1.6}
    .info-box strong{color:var(--text-1)}
    @media(max-width:640px){.card{padding:32px 24px}}
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading your session...</div>
</div>

<div class="page" id="page" style="display:none">
  <div class="card" id="step-card">
    <!-- Content injected by JS -->
  </div>
</div>

<script>
  const api = async (url, options = {}) => {
    options.headers = options.headers || {};
    if (window.Clerk && window.Clerk.session) {
      const token = await window.Clerk.session.getToken();
      options.headers['Authorization'] = `Bearer ${token}`;
    }
    const res = await fetch(url, options);
    if (!res.ok) {
      let err;
      try { err = await res.json(); } catch(e) { err = {error: res.statusText}; }
      throw new Error(err.error || err.message || 'API request failed');
    }
    return res.json();
  };

  function showWelcome() {
    document.getElementById('step-card').innerHTML = `
      <div class="logo-container">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <h1>Welcome to Algo Colleague</h1>
      <p class="subtitle">Your all-in-one LinkedIn automation suite for scheduling posts, managing connections, and tracking analytics.</p>
      
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-icon">📅</div>
          <div class="feature-text">
            <h4>Scheduled Posting</h4>
            <p>Queue weeks of content in minutes</p>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <div class="feature-text">
            <h4>Real Analytics</h4>
            <p>Track impressions, likes, and engagement</p>
          </div>
        </div>
      </div>

      <div class="info-box">
        <div style="font-size:1.2rem;flex-shrink:0">ℹ️</div>
        <p>This app uses <strong>LinkedIn's official OAuth 2.0</strong> to securely connect your account. We never store your password.</p>
      </div>

      <button class="btn btn-linkedin" onclick="startOAuth()" id="oauth-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
        Connect with LinkedIn
      </button>
    `;
  }

  async function startOAuth() {
    var btn = document.getElementById('oauth-btn');
    btn.disabled = true; btn.textContent = 'Opening LinkedIn...';
    try {
      var redirectUri = window.location.origin + '/setup';
      var data = await api('/api/auth/url?redirectUri=' + encodeURIComponent(redirectUri));
      if (data.url) { window.location.href = data.url; }
      else throw new Error('No authorization URL received');
    } catch(err) {
      alert('Failed to start authorization: ' + err.message);
      btn.disabled = false;
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg> Connect with LinkedIn';
    }
  }

  function showSuccess(profileName) {
    document.getElementById('step-card').innerHTML = `
      <div class="success-icon">🎉</div>
      <h2 style="font-family:'Space Grotesk',sans-serif;font-size:2.2rem;margin-bottom:16px;">You're all set!</h2>
      <p class="subtitle">${profileName ? 'Welcome, <strong style="color:var(--text-1)">' + profileName + '</strong>! ' : ''}Your LinkedIn account is now connected.</p>
      
      <div class="info-box" style="background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.2);">
        <div style="font-size:1.2rem;flex-shrink:0">✅</div>
        <p>You can now schedule posts, track analytics, and manage connections from your dashboard.</p>
      </div>

      <button class="btn btn-primary" onclick="window.location.href='/app'">
        Open Dashboard &rarr;
      </button>
    `;
    api('/api/templates/seed', {method: 'POST'}).catch(function() {});
  }

  async function init() {
    var overlay = document.getElementById('loading-overlay');
    var page = document.getElementById('page');
    var loadingText = document.getElementById('loading-text');

    if (!window.Clerk) {
      loadingText.textContent = 'Authentication failed to load. Please refresh the page.';
      return;
    }

    try {
      await window.Clerk.load();

      if (!window.Clerk.user) {
        window.location.href = '/?redirect=false';
        return;
      }

      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var oauthError = params.get('error');

      function showPage() {
        overlay.style.opacity = '0';
        setTimeout(function() { overlay.style.display = 'none'; page.style.display = 'flex'; }, 400);
      }

      if (oauthError) {
        window.history.replaceState({}, '', '/setup');
        showPage();
        showWelcome();
        setTimeout(function() { alert('LinkedIn authorization was cancelled. Please try again.'); }, 300);
        return;
      }

      if (code) {
        loadingText.textContent = 'Finalizing your LinkedIn connection...';
        window.history.replaceState({}, '', '/setup');
        var redirectUri = window.location.origin + '/setup';
        try {
          var res = await api('/api/auth/callback', {method: 'POST', body: {code: code, redirectUri: redirectUri}});
          showPage();
          if (res.success) {
            var profileName = '';
            try { var s = await api('/api/auth/status'); profileName = (s.profile && s.profile.name) || ''; } catch(e) {}
            showSuccess(profileName);
          } else {
            showWelcome();
            setTimeout(function() { alert('LinkedIn connection failed. Please try again.'); }, 300);
          }
        } catch(err) {
          showPage();
          showWelcome();
          setTimeout(function() { alert('Error connecting LinkedIn: ' + err.message); }, 300);
        }
        return;
      }

      // Check if already fully connected
      try {
        var statusData = await api('/api/auth/status');
        if (statusData.authenticated) { window.location.href = '/app'; return; }
      } catch(e) {}

      showPage();
      showWelcome();

    } catch(err) {
      console.error('Setup error:', err);
      loadingText.textContent = 'Something went wrong. Please refresh the page.';
    }
  }

  window.addEventListener('load', init);
</script>
</body>
</html>
