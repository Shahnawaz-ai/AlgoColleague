<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Algo Colleague — Schedule posts, manage connections, track analytics and grow your LinkedIn presence.">
  <title>Algo Colleague — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='9' fill='url(%23g)'/><path d='M7 18h5l3.5-7 5 14 3.5-7h5' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='7' cy='18' r='2' fill='white'/><circle cx='29' cy='18' r='2' fill='white'/><defs><linearGradient id='g' x1='0' y1='0' x2='36' y2='36'><stop stop-color='%233b82f6'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs></svg>">
</head>
<body>
  <div class="app-layout" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <!-- Algo Colleague SVG Logo -->
          <svg class="sidebar-logo-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36" style="flex-shrink:0">
            <rect width="36" height="36" rx="9" fill="url(#ac-grad)"/>
            <path d="M7 18h5l3.5-7 5 14 3.5-7h5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
            <circle cx="7" cy="18" r="2" fill="white"/>
            <circle cx="29" cy="18" r="2" fill="white"/>
            <defs>
              <linearGradient id="ac-grad" x1="0" y1="0" x2="36" y2="36">
                <stop stop-color="#3b82f6"/><stop offset="1" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
          <div>
            <div class="sidebar-logo-text">Algo Colleague</div>
            <div class="sidebar-logo-badge">Automation Suite</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <a class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
            <span class="nav-item-icon">📊</span>
            <span>Dashboard</span>
          </a>
          <a class="nav-item" data-page="composer" onclick="App.navigate('composer')">
            <span class="nav-item-icon">✍️</span>
            <span>Compose Post</span>
          </a>
          <a class="nav-item" data-page="roadmap" onclick="App.navigate('roadmap')">
            <span class="nav-item-icon">🚀</span>
            <span>Auto-Pilot</span>
          </a>
          <a class="nav-item" data-page="posts" onclick="App.navigate('posts')">
            <span class="nav-item-icon">📋</span>
            <span>Post Queue</span>
          </a>
          <a class="nav-item" data-page="calendar" onclick="App.navigate('calendar')">
            <span class="nav-item-icon">📅</span>
            <span>Content Calendar</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Engagement</div>
          <a class="nav-item" data-page="connections" onclick="App.navigate('connections')">
            <span class="nav-item-icon">🤝</span>
            <span>Connections</span>
            <span class="nav-item-badge" id="pending-connections-badge" style="display:none">0</span>
          </a>
          <a class="nav-item" data-page="comments" onclick="App.navigate('comments')">
            <span class="nav-item-icon">💬</span>
            <span>Comments</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Library</div>
          <a class="nav-item" data-page="profile" onclick="App.navigate('profile')">
            <span class="nav-item-icon">👤</span>
            <span>My Profile</span>
          </a>
          <a class="nav-item" data-page="templates" onclick="App.navigate('templates')">
            <span class="nav-item-icon">📝</span>
            <span>Templates</span>
          </a>
          <a class="nav-item" data-page="settings" onclick="App.navigate('settings')">
            <span class="nav-item-icon">⚙️</span>
            <span>Settings</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <!-- Back to Home link -->
        <a href="/?redirect=false" class="nav-item" style="margin-bottom:8px; opacity:0.7; text-decoration:none;">
          <span class="nav-item-icon">🏠</span>
          <span>Back to Home</span>
        </a>
        <div id="clerk-user-button" style="padding: 12px; margin-top: 8px;"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-container">
        <div class="loading-overlay">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Dock -->
  <nav class="bottom-dock">
    <a class="dock-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
      <span class="dock-icon">📊</span>
    </a>
    <a class="dock-item" data-page="composer" onclick="App.navigate('composer')">
      <span class="dock-icon">✍️</span>
    </a>
    <a class="dock-item" data-page="roadmap" onclick="App.navigate('roadmap')">
      <span class="dock-icon">🚀</span>
    </a>
    <a class="dock-item" data-page="posts" onclick="App.navigate('posts')">
      <span class="dock-icon">📋</span>
    </a>
    <a class="dock-item" data-page="connections" onclick="App.navigate('connections')">
      <span class="dock-icon">🤝</span>
    </a>
    <a class="dock-item" data-page="settings" onclick="App.navigate('settings')">
      <span class="dock-icon">⚙️</span>
    </a>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Clerk Authentication Script -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_aW50ZW50LWJ1Y2stNTYuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <!-- Scripts -->

  <script src="/js/app.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/roadmap.js"></script>
  <script src="/js/pages/composer.js"></script>
  <script src="/js/pages/posts.js"></script>
  <script src="/js/pages/calendar.js"></script>
  <script src="/js/pages/analytics.js"></script>
  <script src="/js/pages/connections.js"></script>
  <script src="/js/pages/comments.js"></script>
  <script src="/js/pages/templates.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script>
    window.addEventListener('load', async function () {
      if (window.Clerk) {
        await window.Clerk.load();
        if (!window.Clerk.user) {
          window.location.href = '/?redirect=false';
          return;
        }
        
        // Mount Clerk UserButton in sidebar
        const userButtonDiv = document.getElementById('clerk-user-button');
        window.Clerk.mountUserButton(userButtonDiv);
        
        // Initialize App after Clerk is ready
        App.init();
      } else {
        console.error('Clerk failed to load');
        App.init();
      }
    });
  </script>
</body>
</html>
