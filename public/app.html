<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Algo Colleague — Schedule posts, manage connections, track analytics and grow your LinkedIn presence.">
  <title>Algo Colleague — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='10' fill='url(%23g)'/><path d='M9 26V10h3.5v13h8V26H9z' fill='white'/><path d='M23 10h3.5v7.5l3-7.5h4L30 17.5l3.5 8.5H29.5l-3-6V26H23V10z' fill='white'/><defs><linearGradient id='g' x1='0' y1='0' x2='36' y2='36'><stop stop-color='%236366f1'/><stop offset='1' stop-color='%238b5cf6'/></linearGradient></defs></svg>">
</head>
<body>
  <div class="app-layout" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <!-- Algo Colleague SVG Logo -->
          <svg class="sidebar-logo-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36" style="flex-shrink:0">
            <rect width="36" height="36" rx="10" fill="url(#slg)"/>
            <path d="M9 26V10h3.5v13h8V26H9z" fill="white" opacity="0.95"/>
            <path d="M23 10h3.5v7.5l3-7.5h4L30 17.5l3.5 8.5H29.5l-3-6V26H23V10z" fill="white" opacity="0.95"/>
            <defs>
              <linearGradient id="slg" x1="0" y1="0" x2="36" y2="36">
                <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <div>
            <div class="sidebar-logo-text">Algo Colleague</div>
            <div class="sidebar-logo-badge">Automation Suite</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <a class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
            <span class="nav-item-icon">📊</span>
            <span>Dashboard</span>
          </a>
          <a class="nav-item" data-page="composer" onclick="App.navigate('composer')">
            <span class="nav-item-icon">✍️</span>
            <span>Compose Post</span>
          </a>
          <a class="nav-item" data-page="posts" onclick="App.navigate('posts')">
            <span class="nav-item-icon">📋</span>
            <span>Post Queue</span>
          </a>
          <a class="nav-item" data-page="calendar" onclick="App.navigate('calendar')">
            <span class="nav-item-icon">📅</span>
            <span>Content Calendar</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Engagement</div>
          <a class="nav-item" data-page="connections" onclick="App.navigate('connections')">
            <span class="nav-item-icon">🤝</span>
            <span>Connections</span>
            <span class="nav-item-badge" id="pending-connections-badge" style="display:none">0</span>
          </a>
          <a class="nav-item" data-page="comments" onclick="App.navigate('comments')">
            <span class="nav-item-icon">💬</span>
            <span>Comments</span>
          </a>
          <a class="nav-item" data-page="analytics" onclick="App.navigate('analytics')">
            <span class="nav-item-icon">📈</span>
            <span>Analytics</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Library</div>
          <a class="nav-item" data-page="templates" onclick="App.navigate('templates')">
            <span class="nav-item-icon">📝</span>
            <span>Templates</span>
          </a>
          <a class="nav-item" data-page="settings" onclick="App.navigate('settings')">
            <span class="nav-item-icon">⚙️</span>
            <span>Settings</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <!-- Back to Home link -->
        <a href="/" class="nav-item" style="margin-bottom:8px; opacity:0.7; text-decoration:none;">
          <span class="nav-item-icon">🏠</span>
          <span>Back to Home</span>
        </a>
        <div class="sidebar-profile" id="sidebar-profile" onclick="App.navigate('settings')">
          <div class="sidebar-profile-avatar" id="profile-avatar">?</div>
          <div class="sidebar-profile-info">
            <div class="sidebar-profile-name" id="profile-name">Not Connected</div>
            <div class="sidebar-profile-status" id="profile-status">
              <span class="status-dot" style="background: var(--accent-amber)"></span>
              <span>Setup Required</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-container">
        <div class="loading-overlay">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/pages/onboarding.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/composer.js"></script>
  <script src="/js/pages/posts.js"></script>
  <script src="/js/pages/calendar.js"></script>
  <script src="/js/pages/analytics.js"></script>
  <script src="/js/pages/connections.js"></script>
  <script src="/js/pages/comments.js"></script>
  <script src="/js/pages/templates.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
</body>
</html>
